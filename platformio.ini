[env:cadenza-t-embed]
platform = espressif32@6.12.0
board = lilygo-t-display-s3
framework = arduino
lib_extra_dirs = third_party
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = huge_app.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43

build_unflags =
    -std=gnu++11

build_flags =
    -std=gnu++17
    -DU8G2_WITHOUT_FONT_ROTATION
    -DU8X8_WITH_USER_PTR
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_RGB_ORDER=TFT_RGB
    -DTFT_INVERSION_ON=1
    -DTFT_BL=15
    -DTFT_BACKLIGHT_ON=1
    -DTFT_MISO=-1
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=9
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSPI_FREQUENCY=40000000
